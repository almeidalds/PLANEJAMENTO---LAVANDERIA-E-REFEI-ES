
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lavanderia e Refeições</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/HL8VuTM.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Nunito', 'sans-serif'], // Rounder font matches Soft UI better
            },
            colors: {
              brand: {
                50: '#eff6ff',
                100: '#dbeafe',
                200: '#bfdbfe',
                300: '#93c5fd',
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                800: '#1e40af',
                900: '#1e3a8a',
              },
              slate: {
                50: '#f8fafc',
                100: '#f1f5f9', // Base Neu Color
                200: '#e2e8f0',
                300: '#cbd5e1', // Shadow Dark
                400: '#94a3b8',
                800: '#1e293b', 
              },
              neu: {
                base: '#ecf0f3', // Classic Soft UI base
              }
            },
            boxShadow: {
              'soft': '9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5)',
              'soft-sm': '5px 5px 10px #d1d9e6, -5px -5px 10px #ffffff',
              'soft-pressed': 'inset 6px 6px 10px 0 #d1d9e6, inset -6px -6px 10px 0 #ffffff',
              'soft-pressed-sm': 'inset 3px 3px 6px 0 #d1d9e6, inset -3px -3px 6px 0 #ffffff',
              'glow': '0 0 15px rgba(59, 130, 246, 0.5)'
            },
            borderRadius: {
              'xl': '1rem',
              '2xl': '1.5rem',
              '3xl': '2rem',
              '4xl': '3rem',
            }
          }
        }
      }
    </script>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
      }
    }
    </script>
    <style>
      body { 
        font-family: 'Nunito', sans-serif; 
        background-color: #ecf0f3; /* Neu Base */
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #ecf0f3; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 10px;
        border: 2px solid #ecf0f3;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      
      .neu-icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: #ecf0f3;
        box-shadow: 5px 5px 10px #d1d9e6, -5px -5px 10px #ffffff;
        transition: all 0.2s ease;
        color: #64748b;
      }
      .neu-icon-btn:hover {
        color: #3b82f6;
        transform: translateY(-2px);
      }
      .neu-icon-btn:active {
        box-shadow: inset 5px 5px 10px #d1d9e6, inset -5px -5px 10px #ffffff;
        transform: translateY(0);
      }

      .neu-card {
        border-radius: 2rem;
        background: #ecf0f3;
        box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
        border: 1px solid rgba(255,255,255,0.2);
      }
      
      .neu-input {
        background: #ecf0f3;
        box-shadow: inset 5px 5px 10px #d1d9e6, inset -5px -5px 10px #ffffff;
        border-radius: 1rem;
        border: none;
      }
      .neu-input:focus {
        outline: none;
        box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff, 0 0 0 2px rgba(59, 130, 246, 0.3);
      }

      .neu-btn {
         background: #ecf0f3;
         box-shadow: 5px 5px 10px #d1d9e6, -5px -5px 10px #ffffff;
         border-radius: 1rem;
         font-weight: 700;
         color: #3b82f6;
         transition: all 0.2s ease;
      }
      .neu-btn:hover {
         transform: translateY(-2px);
      }
      .neu-btn:active {
         box-shadow: inset 5px 5px 10px #d1d9e6, inset -5px -5px 10px #ffffff;
         transform: translateY(0);
      }

      .neu-btn-primary {
        background: #3b82f6;
        color: white;
        box-shadow: 5px 5px 10px #d1d9e6, -5px -5px 10px #ffffff;
        border-radius: 1rem;
        font-weight: 700;
        transition: all 0.2s ease;
      }
      .neu-btn-primary:hover {
         background: #2563eb;
         transform: translateY(-2px);
         box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
      }
      .neu-btn-primary:active {
         transform: translateY(0);
         box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
      }

    </style>
  </head>
  <body class="text-slate-600 antialiased h-screen overflow-hidden selection:bg-brand-200 selection:text-brand-900">
    <div id="root" class="h-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
